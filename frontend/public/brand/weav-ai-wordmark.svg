<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <filter id="glow" x="-25%" y="-45%" width="150%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="
          0 0 0 0 0.65
          0 0 0 0 0.35
          0 0 0 0 0.95
          0 0 0 0.75 0"
        result="purpleGlow"
      />
      <feMerge>
        <feMergeNode in="purpleGlow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Text -->
  <g filter="url(#glow)">
    <text
      x="0"
      y="138"
      font-family="Space Grotesk, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="140"
      font-weight="900"
      letter-spacing="2"
    >
      <tspan fill="#8B5CF6">WEAV</tspan>
      <tspan dx="28" fill="#FFFFFF">AI</tspan>
    </text>
  </g>
</svg>

